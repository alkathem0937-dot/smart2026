<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد | SmartJudi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen p-6 font-['Cairo']">
    <div class="w-full max-w-lg bg-white rounded-[40px] p-10 shadow-2xl overflow-hidden relative">
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-amber-500 to-yellow-600"></div>
        
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-amber-600 rounded-2xl flex items-center justify-center text-white mx-auto shadow-lg mb-4">
                <i class="fas fa-user-plus text-3xl"></i>
            </div>
            <h1 class="text-3xl font-black text-slate-800 mb-2">إنشاء حساب جديد</h1>
            <p class="text-slate-500 font-bold">انضم إلى مجتمع القضاء الذكي اليمني</p>
        </div>

        <form id="registerForm" class="space-y-5">
            {% csrf_token %}
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-slate-700 font-black text-sm mb-2 mr-1">اسم المستخدم</label>
                    <input type="text" name="username" required class="w-full h-12 bg-slate-50 border border-slate-200 rounded-xl px-4 focus:ring-4 focus:ring-amber-500/10 focus:border-amber-600 outline-none transition-all font-bold">
                </div>
                <div>
                    <label class="block text-slate-700 font-black text-sm mb-2 mr-1">البريد الإلكتروني</label>
                    <input type="email" name="email" required class="w-full h-12 bg-slate-50 border border-slate-200 rounded-xl px-4 focus:ring-4 focus:ring-amber-500/10 focus:border-amber-600 outline-none transition-all font-bold">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-slate-700 font-black text-sm mb-2 mr-1">كلمة المرور</label>
                    <input type="password" name="password" required class="w-full h-12 bg-slate-50 border border-slate-200 rounded-xl px-4 focus:ring-4 focus:ring-amber-500/10 focus:border-amber-600 outline-none transition-all font-bold">
                </div>
                <div>
                    <label class="block text-slate-700 font-black text-sm mb-2 mr-1">تأكيد كلمة المرور</label>
                    <input type="password" name="password_confirm" required class="w-full h-12 bg-slate-50 border border-slate-200 rounded-xl px-4 focus:ring-4 focus:ring-amber-500/10 focus:border-amber-600 outline-none transition-all font-bold">
                </div>
            </div>

            <hr class="border-slate-100 my-2">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-slate-700 font-black text-sm mb-2 mr-1">الاسم الأول</label>
                    <input type="text" name="first_name" required class="w-full h-12 bg-slate-50 border border-slate-200 rounded-xl px-4 focus:ring-4 focus:ring-amber-500/10 focus:border-amber-600 outline-none transition-all font-bold">
                </div>
                <div>
                    <label class="block text-slate-700 font-black text-sm mb-2 mr-1">الاسم الأخير</label>
                    <input type="text" name="last_name" required class="w-full h-12 bg-slate-50 border border-slate-200 rounded-xl px-4 focus:ring-4 focus:ring-amber-500/10 focus:border-amber-600 outline-none transition-all font-bold">
                </div>
            </div>

            <div>
                <label class="block text-slate-700 font-black text-sm mb-2 mr-1">الصفة / الدور</label>
                <select name="role" class="w-full h-12 bg-slate-50 border border-slate-200 rounded-xl px-4 focus:ring-4 focus:ring-amber-500/10 focus:border-amber-600 outline-none transition-all font-bold">
                    <option value="citizen">مواطن</option>
                    <option value="lawyer">محامي</option>
                    <option value="judge">قاضي</option>
                </select>
            </div>

            <button type="submit" id="submitBtn" class="w-full h-14 bg-amber-600 hover:bg-amber-700 text-white rounded-2xl font-black text-lg shadow-xl shadow-amber-600/20 transition-all transform hover:scale-[1.02] flex items-center justify-center gap-3">
                <span>إنشاء الحساب</span>
                <i id="spinner" class="fas fa-spinner fa-spin hidden"></i>
            </button>
        </form>

        <div id="successMsg" class="hidden absolute inset-0 bg-white/95 backdrop-blur-sm flex flex-col items-center justify-center p-10 text-center z-20">
            <div class="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center text-4xl mb-6 scale-0 transition-transform duration-500" id="successIcon">
                <i class="fas fa-check"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-800 mb-2">تم إنشاء الحساب بنجاح!</h2>
            <p class="text-slate-500 font-bold mb-8">أهلاً بك في SmartJudi. سيتم توجيهك لصفحة الدخول الآن...</p>
        </div>

        <div class="mt-8 pt-6 border-t border-slate-100 text-center">
            <p class="text-slate-500 font-bold">لديك حساب بالفعل؟ <a href="/login/" class="text-amber-600 hover:underline">سجل دخولك الآن</a></p>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const spinner = document.getElementById('spinner');
            const successDiv = document.getElementById('successMsg');
            const successIcon = document.getElementById('successIcon');
            
            // Collect data
            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());
            
            // Basic validation
            if (data.password !== data.password_confirm) {
                alert('كلمات المرور غير متطابقة');
                return;
            }

            btn.disabled = true;
            spinner.classList.remove('hidden');

            try {
                const response = await fetch('/api/register/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': '{{ csrf_token }}'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    // Show success
                    successDiv.classList.remove('hidden');
                    setTimeout(() => successIcon.classList.add('scale-100'), 50);
                    
                    // Redirect after 2 seconds
                    setTimeout(() => {
                        window.location.href = '/login/';
                    }, 2500);
                } else {
                    // Show error
                    let errorMsg = '';
                    for (const key in result) {
                        errorMsg += `${result[key]}\n`;
                    }
                    alert(errorMsg || 'حدث خطأ أثناء التسجيل');
                    btn.disabled = false;
                    spinner.classList.add('hidden');
                }
            } catch (error) {
                alert('خطأ في الاتصال بالسيرفر');
                btn.disabled = false;
                spinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
