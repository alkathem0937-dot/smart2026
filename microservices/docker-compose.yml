version: '3.8'

services:
  # ─── Infrastructure ───
  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      auth:
        condition: service_healthy
      cases:
        condition: service_healthy
      hearings:
        condition: service_healthy
      documents:
        condition: service_healthy
      legal:
        condition: service_healthy
      notifications:
        condition: service_healthy
      search:
        condition: service_healthy
    networks: [smartjudi-net]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks: [smartjudi-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Databases ───
  db-auth:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smartjudi_auth
      POSTGRES_USER: smartjudi
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smartjudi_secret}
    volumes:
      - pgdata-auth:/var/lib/postgresql/data
    networks: [smartjudi-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartjudi -d smartjudi_auth"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-cases:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smartjudi_cases
      POSTGRES_USER: smartjudi
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smartjudi_secret}
    volumes:
      - pgdata-cases:/var/lib/postgresql/data
    networks: [smartjudi-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartjudi -d smartjudi_cases"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-hearings:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smartjudi_hearings
      POSTGRES_USER: smartjudi
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smartjudi_secret}
    volumes:
      - pgdata-hearings:/var/lib/postgresql/data
    networks: [smartjudi-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartjudi -d smartjudi_hearings"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-documents:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smartjudi_documents
      POSTGRES_USER: smartjudi
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smartjudi_secret}
    volumes:
      - pgdata-documents:/var/lib/postgresql/data
    networks: [smartjudi-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartjudi -d smartjudi_documents"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-legal:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smartjudi_legal
      POSTGRES_USER: smartjudi
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smartjudi_secret}
    volumes:
      - pgdata-legal:/var/lib/postgresql/data
    networks: [smartjudi-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartjudi -d smartjudi_legal"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-notifications:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smartjudi_notifications
      POSTGRES_USER: smartjudi
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smartjudi_secret}
    volumes:
      - pgdata-notifications:/var/lib/postgresql/data
    networks: [smartjudi-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartjudi -d smartjudi_notifications"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-search:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smartjudi_search
      POSTGRES_USER: smartjudi
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smartjudi_secret}
    volumes:
      - pgdata-search:/var/lib/postgresql/data
    networks: [smartjudi-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartjudi -d smartjudi_search"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Application Services ───
  auth:
    build: ./services/auth
    environment:
      DATABASE_URL: postgres://smartjudi:${DB_PASSWORD:-smartjudi_secret}@db-auth:5432/smartjudi_auth
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      REDIS_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: auth_service.settings
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      db-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [smartjudi-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  cases:
    build: ./services/cases
    environment:
      DATABASE_URL: postgres://smartjudi:${DB_PASSWORD:-smartjudi_secret}@db-cases:5432/smartjudi_cases
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      REDIS_URL: redis://redis:6379/0
      AUTH_SERVICE_URL: http://auth:8000
      DJANGO_SETTINGS_MODULE: cases_service.settings
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      db-cases:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [smartjudi-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  hearings:
    build: ./services/hearings
    environment:
      DATABASE_URL: postgres://smartjudi:${DB_PASSWORD:-smartjudi_secret}@db-hearings:5432/smartjudi_hearings
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      REDIS_URL: redis://redis:6379/0
      CASES_SERVICE_URL: http://cases:8000
      AUTH_SERVICE_URL: http://auth:8000
      DJANGO_SETTINGS_MODULE: hearings_service.settings
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      db-hearings:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [smartjudi-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  documents:
    build: ./services/documents
    environment:
      DATABASE_URL: postgres://smartjudi:${DB_PASSWORD:-smartjudi_secret}@db-documents:5432/smartjudi_documents
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      REDIS_URL: redis://redis:6379/0
      CASES_SERVICE_URL: http://cases:8000
      DJANGO_SETTINGS_MODULE: documents_service.settings
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    volumes:
      - media-documents:/app/media
    depends_on:
      db-documents:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [smartjudi-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  legal:
    build: ./services/legal
    environment:
      DATABASE_URL: postgres://smartjudi:${DB_PASSWORD:-smartjudi_secret}@db-legal:5432/smartjudi_legal
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DJANGO_SETTINGS_MODULE: legal_service.settings
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      db-legal:
        condition: service_healthy
    networks: [smartjudi-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  notifications:
    build: ./services/notifications
    environment:
      DATABASE_URL: postgres://smartjudi:${DB_PASSWORD:-smartjudi_secret}@db-notifications:5432/smartjudi_notifications
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      REDIS_URL: redis://redis:6379/0
      AUTH_SERVICE_URL: http://auth:8000
      DJANGO_SETTINGS_MODULE: notifications_service.settings
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      db-notifications:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [smartjudi-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  search:
    build: ./services/search
    environment:
      DATABASE_URL: postgres://smartjudi:${DB_PASSWORD:-smartjudi_secret}@db-search:5432/smartjudi_search
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      REDIS_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: search_service.settings
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      db-search:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [smartjudi-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  ai:
    build: ./services/ai
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-intfloat/multilingual-e5-small}
      CHROMA_DB_DIR: /data/chroma_db
    volumes:
      - ai-chromadb:/data/chroma_db
    networks: [smartjudi-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  redis-data:
  pgdata-auth:
  pgdata-cases:
  pgdata-hearings:
  pgdata-documents:
  pgdata-legal:
  pgdata-notifications:
  pgdata-search:
  media-documents:
  ai-chromadb:

networks:
  smartjudi-net:
    driver: bridge
