# SmartJudi API Gateway — Nginx Configuration
# Routes all /api/* requests to the correct microservice

upstream auth_upstream      { server auth:8000; }
upstream cases_upstream     { server cases:8000; }
upstream hearings_upstream  { server hearings:8000; }
upstream documents_upstream { server documents:8000; }
upstream legal_upstream     { server legal:8000; }
upstream notif_upstream     { server notifications:8000; }
upstream search_upstream    { server search:8000; }
upstream ai_upstream        { server ai:8000; }

server {
    listen 80;
    server_name _;

    client_max_body_size 25M;

    # ─── Shared headers ───
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;

    # ─── Health endpoint (gateway level) ───
    location = /health/ {
        return 200 '{"status":"ok","service":"gateway"}';
        add_header Content-Type application/json;
    }

    # ─── Auth Service ───
    location /api/token/ {
        proxy_pass http://auth_upstream;
    }
    location /api/register/ {
        proxy_pass http://auth_upstream;
    }
    location /api/create-sub-account/ {
        proxy_pass http://auth_upstream;
    }
    location /api/profiles/ {
        proxy_pass http://auth_upstream;
    }
    location /api/user-sessions/ {
        proxy_pass http://auth_upstream;
    }

    # ─── Cases Service ───
    location /api/cases/ {
        proxy_pass http://cases_upstream;
    }
    location /api/case-parties/ {
        proxy_pass http://cases_upstream;
    }
    location /api/lawsuits/ {
        proxy_pass http://cases_upstream;
    }
    location /api/legal-templates/ {
        proxy_pass http://cases_upstream;
    }
    location /api/financial-claims/ {
        proxy_pass http://cases_upstream;
    }
    location /api/plaintiffs/ {
        proxy_pass http://cases_upstream;
    }
    location /api/defendants/ {
        proxy_pass http://cases_upstream;
    }
    location /api/responses/ {
        proxy_pass http://cases_upstream;
    }
    location /api/appeals/ {
        proxy_pass http://cases_upstream;
    }
    location /api/judgments/ {
        proxy_pass http://cases_upstream;
    }
    location /api/payment-orders/ {
        proxy_pass http://cases_upstream;
    }
    location /api/audit-logs/ {
        proxy_pass http://cases_upstream;
    }
    location /api/case-file-items/ {
        proxy_pass http://documents_upstream;
    }

    # ─── Hearings Service ───
    location /api/hearings/ {
        proxy_pass http://hearings_upstream;
    }

    # ─── Documents Service ───
    location /api/attachments/ {
        proxy_pass http://documents_upstream;
    }

    # ─── Legal Service ───
    location /api/governorates/ {
        proxy_pass http://legal_upstream;
    }
    location /api/districts/ {
        proxy_pass http://legal_upstream;
    }
    location /api/court-types/ {
        proxy_pass http://legal_upstream;
    }
    location /api/court-specializations/ {
        proxy_pass http://legal_upstream;
    }
    location /api/courts/ {
        proxy_pass http://legal_upstream;
    }
    location /api/legal-categories/ {
        proxy_pass http://legal_upstream;
    }
    location /api/laws/ {
        proxy_pass http://legal_upstream;
    }
    location /api/law-chapters/ {
        proxy_pass http://legal_upstream;
    }
    location /api/law-sections/ {
        proxy_pass http://legal_upstream;
    }
    location /api/law-articles/ {
        proxy_pass http://legal_upstream;
    }
    location /api/case-legal-references/ {
        proxy_pass http://legal_upstream;
    }
    location /api/legal-library/ {
        proxy_pass http://legal_upstream;
    }
    location /api/legal-procedures/ {
        proxy_pass http://legal_upstream;
    }
    location /api/lawyers/ {
        proxy_pass http://legal_upstream;
    }
    location /api/lawyer-filter-options/ {
        proxy_pass http://legal_upstream;
    }

    # ─── Notifications Service ───
    location /api/notifications/ {
        proxy_pass http://notif_upstream;
    }
    location /api/messaging/ {
        proxy_pass http://notif_upstream;
    }

    # ─── Search Service ───
    location /api/search-logs/ {
        proxy_pass http://search_upstream;
    }
    location /api/ai-chat-logs/ {
        proxy_pass http://search_upstream;
    }

    # ─── AI Service ───
    location /api/ai/ {
        proxy_pass http://ai_upstream;
        proxy_read_timeout 180s;
    }

    # ─── Block internal endpoints from external access ───
    location /internal/ {
        return 403 '{"error":"forbidden"}';
        add_header Content-Type application/json;
    }

    # ─── Django Admin (route to cases as the main service) ───
    location /admin/ {
        proxy_pass http://cases_upstream;
    }

    # ─── Static & Media ───
    location /static/ {
        proxy_pass http://cases_upstream;
    }
    location /media/ {
        proxy_pass http://documents_upstream;
    }

    # ─── Swagger/OpenAPI docs ───
    location /swagger/ {
        proxy_pass http://cases_upstream;
    }
    location /redoc/ {
        proxy_pass http://cases_upstream;
    }

    # ─── Default fallback ───
    location / {
        return 404 '{"error":"endpoint not found"}';
        add_header Content-Type application/json;
    }
}
