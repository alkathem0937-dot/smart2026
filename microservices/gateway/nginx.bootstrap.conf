# SmartJudi Gateway (Bootstrap)
# Goal: start using the gateway immediately while still routing most endpoints to the monolith.
# Phase 2B starts by extracting COURTS reference data into legal-service.

upstream legal_upstream    { server legal:8000; }
upstream monolith_upstream { server host.docker.internal:8000; }

server {
    listen 80;
    server_name _;

    client_max_body_size 25M;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;

    location = /health/ {
        return 200 '{"status":"ok","service":"gateway"}';
        add_header Content-Type application/json;
    }

    # ---- Extracted endpoints (legal-service) ----
    location /api/governorates/          { proxy_pass http://legal_upstream; }
    location /api/districts/             { proxy_pass http://legal_upstream; }
    location /api/court-types/           { proxy_pass http://legal_upstream; }
    location /api/court-specializations/ { proxy_pass http://legal_upstream; }
    location /api/courts/                { proxy_pass http://legal_upstream; }

    # ---- Everything else remains on monolith for now ----
    location /api/ { proxy_pass http://monolith_upstream; }

    location /admin/  { proxy_pass http://monolith_upstream; }
    location /swagger/ { proxy_pass http://monolith_upstream; }
    location /redoc/   { proxy_pass http://monolith_upstream; }
    location /static/  { proxy_pass http://monolith_upstream; }
    location /media/   { proxy_pass http://monolith_upstream; }

    location /internal/ {
        return 403 '{"error":"forbidden"}';
        add_header Content-Type application/json;
    }

    location / {
        return 404 '{"error":"endpoint not found"}';
        add_header Content-Type application/json;
    }
}
